name: Process Atlas submission

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: atlas-content-write
  cancel-in-progress: false

jobs:
  process:
    if: ${{ github.event.issue.state == 'open' && contains(github.event.issue.labels.*.name, 'atlas-aanvulling') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check and import the structured submission
        id: import
        continue-on-error: true
        env:
          ATLAS_ISSUE_BODY: ${{ github.event.issue.body }}
          ATLAS_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python scripts/import_issue_submission.py \
            --report-json "$RUNNER_TEMP/atlas-issue-report.json" \
            --report-markdown "$RUNNER_TEMP/atlas-issue-report.md"

      - name: Validate and generate public data
        if: ${{ steps.import.outcome == 'success' }}
        run: |
          python scripts/validate_data.py
          python scripts/generate_data.py
          python -m unittest discover tests

      - name: Commit a successful contribution
        if: ${{ steps.import.outcome == 'success' }}
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "atlas-quality-bot"
          git config user.email "atlas-quality-bot@users.noreply.github.com"
          git add data/records.json data/metadata.json data/data-v2.js data/search-index.json
          git commit -m "Publiceer brongecontroleerde bijdrage #${ISSUE_NUMBER}"
          git push origin HEAD:main

      - name: Confirm publication and close the request
        if: ${{ steps.import.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh label create "atlas:auto-published" --color "1A7F37" --description "Automatisch bron- en structuurgecontroleerd en gepubliceerd" --force
          gh issue edit "$ISSUE_NUMBER" --add-label "atlas:auto-published"
          gh issue comment "$ISSUE_NUMBER" --body-file "$RUNNER_TEMP/atlas-issue-report.md"
          gh issue close "$ISSUE_NUMBER" --reason completed

      - name: Ask the contributor for a precise correction
        if: ${{ steps.import.outcome != 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh label create "atlas:needs-info" --color "D4A72C" --description "Aanvulling nodig voor automatische publicatie" --force
          gh issue edit "$ISSUE_NUMBER" --add-label "atlas:needs-info"
          gh issue comment "$ISSUE_NUMBER" --body-file "$RUNNER_TEMP/atlas-issue-report.md"
          exit 1
