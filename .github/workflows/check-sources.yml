name: Daily Atlas maintenance review

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: atlas-daily-maintenance
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Restore last known maintenance state
        uses: actions/cache/restore@v6
        with:
          path: maintenance-state
          key: atlas-maintenance-${{ github.run_id }}
          restore-keys: atlas-maintenance-

      - name: Detect, compare and prepare review proposals
        run: python scripts/run_daily_maintenance.py

      - uses: actions/upload-artifact@v7
        with:
          name: atlas-maintenance-${{ github.run_id }}
          path: maintenance-output
          retention-days: 30

      - name: Save last known maintenance state
        uses: actions/cache/save@v6
        with:
          path: maintenance-state
          key: atlas-maintenance-${{ github.run_id }}

      - name: Publish compact review signal
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('maintenance-output/daily-report.json', 'utf8'));
            const markdown = fs.readFileSync('maintenance-output/daily-report.md', 'utf8');
            const { owner, repo } = context.repo;
            const label = 'atlas-daily-review';
            if (!report.summary.actionRequired) {
              await core.summary.addHeading('Geen actie nodig').addRaw(
                `${report.summary.sourcesChecked} bronnen gecontroleerd; geen betekenisvolle wijziging.`
              ).write();
              return;
            }
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner, repo, name: label, color: 'D4A72C',
                description: 'Dagelijkse broncontrole vraagt menselijke beoordeling'
              });
            }
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: label, per_page: 100
            });
            const title = 'Dagelijkse Atlas-controle vraagt beoordeling';
            const existing = open.find(issue => issue.title === title);
            const body = `${markdown}\nWorkflow-artifact: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}\n`;
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
            }
            await core.summary.addHeading('Beoordeling nodig').addRaw(
              `${report.summary.proposalsForReview} voorstel(len); niets is automatisch gepubliceerd.`
            ).write();
