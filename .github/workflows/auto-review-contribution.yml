name: Automatic contribution screening

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'data/records.json'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: atlas-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screen:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted Atlas controls
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read only the proposed data file
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags --depth=1 origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/atlas-pr-${PR_NUMBER}"
          git show "refs/remotes/origin/atlas-pr-${PR_NUMBER}:data/records.json" > "$RUNNER_TEMP/candidate-records.json"
          git diff --name-only HEAD "refs/remotes/origin/atlas-pr-${PR_NUMBER}" > "$RUNNER_TEMP/changed-files.txt"

      - name: Screen structure, duplicates, status and official sources
        id: review
        continue-on-error: true
        run: |
          set +e
          python scripts/review_contribution.py \
            --base data/records.json \
            --candidate "$RUNNER_TEMP/candidate-records.json" \
            --changed-files "$RUNNER_TEMP/changed-files.txt" \
            --report-json "$RUNNER_TEMP/atlas-review.json" \
            --report-markdown "$RUNNER_TEMP/atlas-review.md"
          status=$?
          if [ "$status" -eq 0 ]; then echo "eligible=true" >> "$GITHUB_OUTPUT"; else echo "eligible=false" >> "$GITHUB_OUTPUT"; fi
          exit 0

      - name: Report the screening result for human review
        uses: actions/github-script@v7
        env:
          ELIGIBLE: ${{ steps.review.outputs.eligible }}
          REPORT_PATH: ${{ runner.temp }}/atlas-review.md
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const eligible = process.env.ELIGIBLE === 'true';
            const marker = '<!-- atlas-automatic-review -->';
            const report = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const body = `${marker}\n${report}`;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const previous = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
            const wanted = eligible ? 'atlas:checks-passed' : 'atlas:needs-attention';
            const unwanted = eligible ? 'atlas:needs-attention' : 'atlas:checks-passed';
            try {
              await github.rest.issues.getLabel({ owner, repo, name: wanted });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({ owner, repo, name: wanted, color: eligible ? '1A7F37' : 'D4A72C', description: eligible ? 'Automatische controles geslaagd; menselijke beoordeling vereist' : 'Aanvulling nodig voor beoordeling' });
            }
            try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: unwanted }); } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [wanted] });
            if (eligible) {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: 'De automatische controles zijn geslaagd. Een mens moet de bijdrage nog beoordelen en mergen; er is niets automatisch gepubliceerd.' });
            }

      - name: Mark an unresolved contribution as failed
        if: ${{ steps.review.outputs.eligible != 'true' }}
        run: exit 1
